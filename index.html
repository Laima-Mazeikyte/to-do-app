<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>to-do-app</title>
  </head>
  <body>
    <div id="app">
      <section class="todo-app" aria-label="To-Do application">
        <header class="todo-header">
          <h1 class="todo-title">To-Do</h1>
          <nav class="todo-nav" aria-label="View switch">
            <a href="spatial.html" class="todo-nav-link">Spatial view</a>
          </nav>
          <div id="auth-header" class="todo-auth-header" aria-label="Account"></div>
        </header>

        <form id="todo-form" class="todo-form" aria-label="Add new task">
          <label for="todo-input" class="todo-label sr-only">New task</label>
          <input id="todo-input" class="todo-input" type="text" name="task" autocomplete="off" />
          <button type="submit" id="todo-submit" class="todo-submit">Add</button>
        </form>

        <div id="todo-error" class="todo-error" role="alert" hidden></div>

        <div class="todo-list-container">
          <section class="todo-zone todo-zone--active" aria-label="To do">
            <h2 class="todo-zone-title">To do</h2>
            <ul id="todo-active-list" class="todo-list" aria-label="Incomplete tasks" data-drop-zone="active"></ul>
          </section>
          <section class="todo-zone todo-zone--done" aria-label="Done">
            <h2 class="todo-zone-title">Done <span id="todo-done-count" class="todo-done-count" aria-live="polite">0</span></h2>
            <ul id="todo-done-list" class="todo-list" aria-label="Completed tasks" data-drop-zone="done"></ul>
          </section>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
