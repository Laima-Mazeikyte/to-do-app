<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>to-do-app</title>
  </head>
  <body>
    <div id="app">
      <section class="todo-app" aria-label="To-Do application">
        <header class="todo-header">
          <h1 class="todo-title">To-Do</h1>
          <nav class="todo-nav" aria-label="View switch">
            <a href="spatial.html" class="todo-nav-link">Spatial view</a>
          </nav>
        </header>

        <form id="todo-form" class="todo-form" aria-label="Add new task">
          <label for="todo-input" class="todo-label sr-only">New task</label>
          <input id="todo-input" class="todo-input" type="text" name="task" autocomplete="off" />
          <button type="submit" id="todo-submit" class="todo-submit">Add</button>
        </form>

        <div class="todo-filters" role="tablist" aria-label="Filter tasks">
          <button type="button" role="tab" class="todo-filter todo-filter--active" aria-selected="true" data-filter="all">All</button>
          <button type="button" role="tab" class="todo-filter" aria-selected="false" data-filter="active">Active</button>
          <button type="button" role="tab" class="todo-filter" aria-selected="false" data-filter="done">Done</button>
        </div>

        <div id="todo-error" class="todo-error" role="alert" hidden></div>

        <div class="todo-zones">
          <div class="todo-zone">
            <h2 class="todo-zone-title">Priority</h2>
            <ul id="todo-priority-list" class="todo-list" aria-label="Priority tasks"></ul>
          </div>
          <div class="todo-zone">
            <h2 class="todo-zone-title">To do</h2>
            <ul id="todo-pile-list" class="todo-list" aria-label="Tasks to do"></ul>
          </div>
          <div class="todo-zone">
            <h2 class="todo-zone-title">Done <span id="todo-done-count" aria-live="polite">0</span></h2>
            <ul id="todo-done-list" class="todo-list" aria-label="Done tasks"></ul>
          </div>
        </div>

        <div id="todo-undo" class="todo-undo" hidden role="status">
          <span id="todo-undo-text"></span>
          <button type="button" id="todo-undo-button" class="todo-undo-button">Undo</button>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
