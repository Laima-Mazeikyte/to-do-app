<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>to-do-app</title>
  </head>
  <body>
    <div id="app">
      <section class="todo-app" aria-label="To-Do application">
        <header class="todo-header">
          <h1 class="todo-title">To-Do</h1>
        </header>

        <form id="todo-form" class="todo-form" aria-label="Add new task">
          <label for="todo-input" class="todo-label sr-only">New task</label>
          <input id="todo-input" class="todo-input" type="text" name="task" autocomplete="off" />
          <button type="submit" id="todo-submit" class="todo-submit">Add</button>
        </form>

        <div class="todo-filters" role="tablist" aria-label="Filter tasks">
          <button type="button" role="tab" class="todo-filter todo-filter--active" aria-selected="true" data-filter="all">All</button>
          <button type="button" role="tab" class="todo-filter" aria-selected="false" data-filter="active">Active</button>
          <button type="button" role="tab" class="todo-filter" aria-selected="false" data-filter="done">Done</button>
        </div>

        <div id="todo-error" class="todo-error" role="alert" hidden></div>

        <ul id="todo-list" class="todo-list" aria-label="Task list">
          <li class="todo-list-empty" aria-live="polite">No tasks yet.</li>
        </ul>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
