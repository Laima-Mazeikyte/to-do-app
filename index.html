<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do</title>
  </head>
  <body>
    <div id="app" class="spatial-app">
      <div class="spatial-floating-top">
        <div class="spatial-top-spacer"></div>
        <div class="spatial-top-center">
          <div class="spatial-add-row">
            <form id="spatial-todo-form" class="spatial-form spatial-form--add" aria-label="Add new task">
              <label for="spatial-todo-input" class="sr-only">New task</label>
              <div class="spatial-input-wrap">
                <input
                  id="spatial-todo-input"
                  class="spatial-input spatial-input--add"
                  type="text"
                  name="task"
                  autocomplete="off"
                  placeholder="Add a task…"
                />
                <button type="submit" id="spatial-todo-submit" class="spatial-btn-inline spatial-btn-inline--add" aria-label="Add task">
                  <span aria-hidden="true">+</span>
                </button>
              </div>
            </form>
          </div>
          <div class="spatial-filters">
            <button type="button" class="spatial-filter-chip spatial-filter-chip--active" data-filter="all">All</button>
            <button type="button" class="spatial-filter-chip" data-filter="todo">To do</button>
            <button type="button" class="spatial-filter-chip" data-filter="done">Done</button>
          </div>
          <button type="button" id="spatial-clear-done-btn" class="spatial-btn-clear-done spatial-btn--tertiary" aria-label="Delete all completed tasks" hidden>Clear done</button>
        </div>
        <div class="spatial-top-right">
          <label for="spatial-search-input" class="sr-only">Search tasks</label>
          <input
            id="spatial-search-input"
            class="spatial-search-input"
            type="search"
            placeholder="Search…"
            aria-label="Search tasks"
            autocomplete="off"
          />
          <div class="spatial-more-wrap">
            <button type="button" id="spatial-more-btn" class="spatial-btn-circle spatial-btn-circle--more" aria-label="More options" aria-haspopup="menu" aria-expanded="false">
              <span aria-hidden="true">⋮</span>
            </button>
            <div id="spatial-more-menu" class="spatial-more-menu" role="menu" hidden>
              <button type="button" class="spatial-more-item" role="menuitem" data-action="copy">Copy todos</button>
              <button type="button" class="spatial-more-item" role="menuitem" data-action="paste">Paste to-dos</button>
            </div>
          </div>
        </div>
      </div>
      <div id="spatial-error" class="spatial-error" role="alert" hidden></div>
      <div id="spatial-stage" class="spatial-stage" aria-live="polite">
        <div id="spatial-empty-state" class="spatial-empty-state" role="status" aria-live="polite" hidden>
          <p id="spatial-empty-state-text" class="spatial-empty-state-text"></p>
        </div>
      </div>
      <div id="spatial-auth-footer" class="spatial-auth-footer">
        <div id="auth-header" class="spatial-auth-header" aria-label="Account"></div>
      </div>
      <div id="spatial-paste-drawer-backdrop" class="spatial-drawer-backdrop" aria-hidden="true" hidden></div>
      <aside id="spatial-paste-drawer" class="spatial-drawer" role="dialog" aria-modal="true" aria-labelledby="spatial-paste-drawer-title" hidden>
        <h2 id="spatial-paste-drawer-title" class="spatial-drawer-title">Paste todos</h2>
        <p class="spatial-drawer-hint">Paste your list here… One line per task. Bullets, numbers, and [ ] are stripped. Long lines become long cards (truncated in view).</p>
        <textarea
          id="spatial-paste-drawer-textarea"
          class="spatial-drawer-textarea"
          placeholder="Paste your list here…"
          aria-label="Pasted list (one line per task)"
          rows="12"
       ></textarea>
        <div id="spatial-paste-drawer-empty" class="spatial-drawer-empty" role="alert" hidden>No tasks to add.</div>
        <div class="spatial-drawer-actions">
          <button type="button" id="spatial-paste-drawer-create" class="spatial-drawer-btn spatial-drawer-btn--primary">Create cards</button>
          <button type="button" id="spatial-paste-drawer-cancel" class="spatial-drawer-btn spatial-drawer-btn--secondary">Cancel</button>
        </div>
      </aside>
      <div id="spatial-undo-bar" class="spatial-undo" role="status" aria-live="polite" hidden>
        <span id="spatial-undo-msg" class="spatial-undo-msg"></span>
        <button type="button" id="spatial-undo-btn" class="spatial-undo-btn" aria-label="Undo delete">Undo</button>
      </div>
    </div>
    <script type="module" src="/src/spatial-main.js"></script>
  </body>
</html>
